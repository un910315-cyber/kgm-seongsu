<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KGM 성수 — 부품 견적 등록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1f1f1f;
  --border: #2a2a2a;
  --accent: #8b5cf6;
  --gold: #C4A96C;
  --green: #22c55e;
  --red: #ef4444;
  --text: #fafafa;
  --text-dim: #a3a3a3;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }

.header {
  background: rgba(10,10,10,.95); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(139,92,246,.15);
  padding: 0 20px; display: flex; align-items: center; justify-content: center;
  height: 56px; position: sticky; top: 0; z-index: 100;
}
.header-title { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
.header-title span { color: var(--accent); }

.container { max-width: 600px; margin: 0 auto; padding: 20px 16px 40px; }

.car-banner {
  background: linear-gradient(135deg, rgba(139,92,246,.1), rgba(196,169,108,.08));
  border: 1px solid rgba(139,92,246,.25); border-radius: 14px;
  padding: 16px 20px; margin-bottom: 24px; text-align: center;
}
.car-num { font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: 2px; font-family: monospace; }
.car-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

.section { margin-bottom: 20px; }
.section-title {
  font-size: 13px; font-weight: 700; color: var(--accent);
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::before { content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }

.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--text-dim); font-weight: 500; margin-bottom: 6px; display: block; }
.form-input, .form-textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color .2s;
}
.form-input:focus, .form-textarea:focus { border-color: var(--accent); }
.form-input::placeholder, .form-textarea::placeholder { color: rgba(163,163,163,.5); }
.form-textarea { resize: vertical; min-height: 80px; }

/* 이미지 업로드 */
.img-upload {
  border: 2px dashed var(--border); border-radius: 14px;
  padding: 30px 20px; text-align: center; cursor: pointer;
  transition: all .3s; background: var(--surface);
}
.img-upload:hover { border-color: var(--accent); background: rgba(139,92,246,.04); }
.img-upload.has-image { border-style: solid; border-color: var(--green); padding: 10px; }
.img-icon { font-size: 36px; margin-bottom: 8px; }
.img-text { font-size: 13px; color: var(--text-dim); }
.img-text strong { color: var(--accent); }
.img-preview {
  width: 100%; max-height: 300px; object-fit: contain; border-radius: 8px; display: none;
}
.img-remove {
  display: none; margin-top: 8px; padding: 6px 14px;
  background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3);
  border-radius: 6px; color: var(--red); font-size: 12px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}

/* 부품 목록 */
.part-row {
  display: grid; grid-template-columns: 1fr 1fr 90px 70px 36px;
  gap: 6px; margin-bottom: 8px; align-items: end;
}
.part-row .form-input { padding: 10px; font-size: 13px; border-radius: 8px; }
.part-label { font-size: 10px; color: var(--text-dim); margin-bottom: 3px; }
.part-del {
  width: 36px; height: 40px; background: rgba(239,68,68,.1);
  border: 1px solid rgba(239,68,68,.2); border-radius: 8px;
  color: var(--red); font-size: 18px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
}
.part-del:hover { background: rgba(239,68,68,.25); }
.add-part-btn {
  width: 100%; padding: 10px; background: rgba(139,92,246,.08);
  border: 1px dashed rgba(139,92,246,.3); border-radius: 10px;
  color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; transition: all .2s;
}
.add-part-btn:hover { background: rgba(139,92,246,.15); border-style: solid; }

/* 제출 */
.submit-btn {
  width: 100%; padding: 16px; margin-top: 24px;
  background: linear-gradient(135deg, #8b5cf6, #6d28d9);
  border: none; border-radius: 14px; color: #fff; font-size: 16px;
  font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  letter-spacing: 1px; transition: all .3s;
  box-shadow: 0 4px 20px rgba(139,92,246,.3);
}
.submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(139,92,246,.4); }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

/* 완료 화면 */
.success-screen {
  display: none; text-align: center; padding: 60px 20px;
}
.success-icon { font-size: 64px; margin-bottom: 16px; }
.success-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.success-desc { font-size: 14px; color: var(--text-dim); line-height: 1.7; }

/* 로딩 */
.loading-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 에러 */
.error-screen { display: none; text-align: center; padding: 80px 20px; }
.error-icon { font-size: 48px; margin-bottom: 12px; }

/* 모바일 */
@media (max-width: 500px) {
  .part-row { grid-template-columns: 1fr 1fr; }
  .part-row > div:nth-child(3) { grid-column: 1; }
  .part-row > div:nth-child(4) { grid-column: 2; }
  .part-row > div:nth-child(5) { grid-column: 1 / -1; }
  .part-del { width: 100%; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">KGM <span>SEONGSU</span> · 부품 견적 등록</div>
</div>

<!-- 에러 화면 (잘못된 링크) -->
<div class="error-screen" id="errorScreen">
  <div class="error-icon">⚠️</div>
  <div style="font-size:18px;font-weight:700;margin-bottom:8px;">잘못된 링크입니다</div>
  <div style="font-size:13px;color:var(--text-dim);">KGM 성수서비스센터에서 전달받은 링크로 접속해주세요</div>
</div>

<!-- 입력 폼 -->
<div class="container" id="formContainer" style="display:none;">
  <div class="car-banner">
    <div class="car-num" id="dispCarNum">—</div>
    <div class="car-sub">위 차량의 부품 견적을 등록해주세요</div>
  </div>

  <!-- 업체명 -->
  <div class="section">
    <div class="section-title">업체 정보</div>
    <div class="form-group">
      <label class="form-label">업체명 *</label>
      <input class="form-input" id="supplierName" placeholder="부품업체명을 입력하세요">
    </div>
    <div class="form-group">
      <label class="form-label">담당자 연락처</label>
      <input class="form-input" id="supplierPhone" placeholder="010-0000-0000" type="tel">
    </div>
  </div>

  <!-- 이미지 업로드 -->
  <div class="section">
    <div class="section-title">견적서 이미지</div>
    <div class="img-upload" id="imgUpload" onclick="document.getElementById('imgFile').click()">
      <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="handleImage(this)">
      <div class="img-icon" id="imgIcon">📷</div>
      <div class="img-text" id="imgText">클릭하여 <strong>견적서 사진</strong>을 업로드하세요<br><span style="font-size:11px;opacity:.6;">JPG, PNG (최대 5MB)</span></div>
      <img class="img-preview" id="imgPreview">
      <button class="img-remove" id="imgRemove" onclick="removeImage(event)">이미지 삭제</button>
    </div>
  </div>

  <!-- 수리 메모 -->
  <div class="section">
    <div class="section-title">수리 메모</div>
    <div class="form-group">
      <textarea class="form-textarea" id="repairMemo" placeholder="수리 관련 메모를 입력하세요 (부품 상태, 특이사항 등)"></textarea>
    </div>
  </div>

  <!-- 부품 목록 -->
  <div class="section">
    <div class="section-title">부품 목록</div>
    <div id="partsList"></div>
    <button class="add-part-btn" onclick="addPartRow()">+ 부품 추가</button>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitQuote()">견적서 제출</button>
</div>

<!-- 완료 화면 -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">✅</div>
  <div class="success-title">견적서가 등록되었습니다</div>
  <div class="success-desc">
    KGM 성수서비스센터에서 확인 후<br>연락드리겠습니다. 감사합니다.
  </div>
</div>

<!-- 로딩 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div style="color:var(--text-dim);font-size:13px;">견적서 제출 중...</div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDkXYh2P-EJPf2A_jwq2Kk2gDs0ZFdMP2M",
    authDomain: "unmotors.firebaseapp.com",
    databaseURL: "https://unmotors-default-rtdb.firebaseio.com",
    projectId: "unmotors",
    storageBucket: "unmotors.firebasestorage.app",
    messagingSenderId: "1065890938470",
    appId: "1:1065890938470:web:d6d1c3503322fd1d9eb7a7"
  };

  const app = initializeApp(firebaseConfig);
  const fsd = getFirestore(app);

  // 이미지 압축 (canvas로 리사이즈 → base64)
  function compressImage(file, maxWidth, quality) {
    return new Promise(function(resolve) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var w = img.width, h = img.height;
          if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // URL 파라미터 파싱
  const params = new URLSearchParams(window.location.search);
  const recordId = params.get('id');
  const carNum = params.get('car');

  if (!recordId || !carNum) {
    document.getElementById('errorScreen').style.display = 'block';
  } else {
    document.getElementById('formContainer').style.display = 'block';
    document.getElementById('dispCarNum').textContent = decodeURIComponent(carNum);
    addPartRow();
  }

  // 이미지 처리
  window._imgFile = null;

  window.handleImage = function(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      alert('이미지 크기는 5MB 이하만 가능합니다.');
      input.value = '';
      return;
    }
    window._imgFile = file;
    const reader = new FileReader();
    reader.onload = function(e) {
      const preview = document.getElementById('imgPreview');
      preview.src = e.target.result;
      preview.style.display = 'block';
      document.getElementById('imgIcon').style.display = 'none';
      document.getElementById('imgText').style.display = 'none';
      document.getElementById('imgRemove').style.display = 'inline-block';
      document.getElementById('imgUpload').classList.add('has-image');
    };
    reader.readAsDataURL(file);
  };

  window.removeImage = function(e) {
    e.stopPropagation();
    window._imgFile = null;
    document.getElementById('imgFile').value = '';
    document.getElementById('imgPreview').style.display = 'none';
    document.getElementById('imgPreview').src = '';
    document.getElementById('imgIcon').style.display = 'block';
    document.getElementById('imgText').style.display = 'block';
    document.getElementById('imgRemove').style.display = 'none';
    document.getElementById('imgUpload').classList.remove('has-image');
  };

  // 부품 행 추가
  var partIndex = 0;
  window.addPartRow = function() {
    var idx = partIndex++;
    var div = document.createElement('div');
    div.className = 'part-row';
    div.id = 'part-' + idx;
    div.innerHTML =
      '<div><div class="part-label">부품명 *</div><input class="form-input" placeholder="예: 앞범퍼" data-field="name"></div>'
      + '<div><div class="part-label">부품번호</div><input class="form-input" placeholder="예: 7711-34520" data-field="code"></div>'
      + '<div><div class="part-label">단가 (원)</div><input class="form-input" type="number" placeholder="0" data-field="price"></div>'
      + '<div><div class="part-label">수량</div><input class="form-input" type="number" placeholder="1" value="1" min="1" data-field="qty"></div>'
      + '<div><div class="part-label">&nbsp;</div><button class="part-del" onclick="delPart(' + idx + ')">×</button></div>';
    document.getElementById('partsList').appendChild(div);
  };

  window.delPart = function(idx) {
    var el = document.getElementById('part-' + idx);
    if (el) el.remove();
    // 최소 1행 유지
    if (!document.getElementById('partsList').children.length) addPartRow();
  };

  // 제출
  window.submitQuote = async function() {
    var supplier = document.getElementById('supplierName').value.trim();
    if (!supplier) { alert('업체명을 입력해주세요.'); return; }

    // 부품 목록 수집
    var parts = [];
    var rows = document.querySelectorAll('.part-row');
    rows.forEach(function(row) {
      var name = row.querySelector('[data-field="name"]').value.trim();
      var code = row.querySelector('[data-field="code"]').value.trim();
      var price = parseInt(row.querySelector('[data-field="price"]').value) || 0;
      var qty = parseInt(row.querySelector('[data-field="qty"]').value) || 1;
      if (name) parts.push({ name: name, code: code, price: price, qty: qty, subtotal: price * qty });
    });

    if (!parts.length) { alert('부품을 최소 1개 이상 입력해주세요.'); return; }

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    document.getElementById('loadingOverlay').classList.add('show');

    try {
      var imgData = '';

      // 이미지 압축 후 base64로 변환 (Storage 불필요)
      if (window._imgFile) {
        imgData = await compressImage(window._imgFile, 1200, 0.7);
      }

      // 총액 계산
      var totalAmount = parts.reduce(function(s, p) { return s + p.subtotal; }, 0);

      // Firestore에 저장
      var quoteId = 'PQ' + Date.now();
      await setDoc(doc(fsd, 'parts_quotes', quoteId), {
        id: quoteId,
        recordId: recordId,
        carNum: decodeURIComponent(carNum),
        supplier: supplier,
        phone: document.getElementById('supplierPhone').value.trim(),
        imageData: imgData,
        memo: document.getElementById('repairMemo').value.trim(),
        parts: parts,
        totalAmount: totalAmount,
        submittedAt: serverTimestamp(),
        status: 'pending'
      });

      // 완료 화면
      document.getElementById('loadingOverlay').classList.remove('show');
      document.getElementById('formContainer').style.display = 'none';
      document.getElementById('successScreen').style.display = 'block';

    } catch(e) {
      document.getElementById('loadingOverlay').classList.remove('show');
      btn.disabled = false;
      alert('제출 실패: ' + e.message + '\n\n다시 시도해주세요.');
      console.error(e);
    }
  };
</script>
</body>
</html>
